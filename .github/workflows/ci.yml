name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-2022
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Fetch pre-built DLLs from the artifacts branch
      - name: Fetch artifact DLLs
        run: |
          git fetch origin artifacts --depth=1
          git checkout origin/artifacts -- Aether.dll dbghelp.dll mozjs.dll

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daemon
        run: pnpm --filter @aether/daemon build

      - name: Run daemon tests
        run: pnpm --filter @aether/daemon test
        timeout-minutes: 5
        continue-on-error: true

      # ── Set up minimal D2 game directory ──────────────────────────────
      - name: Prepare minimal game directory
        shell: pwsh
        run: |
          $gameDir = "packages/native/minimal"
          
          # Copy artifact DLLs into the game directory
          Copy-Item Aether.dll, dbghelp.dll, mozjs.dll -Destination $gameDir
          
          # D2 1.14d uses KnownFolder SavedGames via SHGetKnownFolderPath
          $savedGames = [Environment]::GetFolderPath('UserProfile') + '\Saved Games\Diablo II'
          New-Item -ItemType Directory -Force -Path $savedGames | Out-Null
          Copy-Item "$gameDir/saves/*.d2s" -Destination $savedGames
          Write-Host "Saves copied to: $savedGames"
          Get-ChildItem $savedGames

      # ── Start daemon in test mode ─────────────────────────────────────
      - name: Start daemon (test mode)
        shell: bash
        run: |
          cd packages/daemon
          node dist/index.js --tests &
          sleep 2
          echo "Daemon started in test mode"

      # ── Launch game and run in-game tests ─────────────────────────────
      - name: Run in-game tests
        shell: pwsh
        timeout-minutes: 3
        env:
          AETHER_DAEMON: 127.0.0.1:13119
          AETHER_ENTRY: main.ts
        run: |
          cd packages\native\minimal
          # Debug: show architecture and DLLs
          Write-Host "Processor: $env:PROCESSOR_ARCHITECTURE"
          Write-Host "DLLs in game dir:"
          Get-ChildItem *.dll | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

          $proc = Start-Process -FilePath .\Game.exe `
            -ArgumentList "-w -nosound --headless -loaddll Aether.dll" `
            -WorkingDirectory $PWD `
            -PassThru -NoNewWindow

          # Wait for tests to complete (watch log for results)
          $deadline = (Get-Date).AddSeconds(30)
          while ((Get-Date) -lt $deadline) {
            if ((Test-Path aether_log.txt) -and (Select-String -Path aether_log.txt -Pattern "Results:.*failed" -Quiet)) {
              Write-Host "Test results detected in log"
              break
            }
            Start-Sleep -Milliseconds 500
          }

          # Dump log
          if (Test-Path aether_log.txt) {
            Write-Host "=== aether_log.txt ==="
            Get-Content aether_log.txt
          } else {
            Write-Host "WARNING: aether_log.txt not found"
          }

          # Clean up
          if (!$proc.HasExited) {
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          }
          Stop-Process -Name node -Force -ErrorAction SilentlyContinue

      - name: Check test results
        if: always()
        shell: bash
        run: |
          LOG="packages/native/minimal/aether_log.txt"
          echo "=== Game Test Output ==="
          cat "$LOG" 2>/dev/null || { echo "No log file found"; exit 1; }
          echo ""
          # Check for test results line
          if grep -q "Results:.*failed" "$LOG"; then
            FAILED=$(grep "Results:" "$LOG" | sed -n 's/.*\([0-9][0-9]*\) failed.*/\1/p')
            if [ "$FAILED" != "0" ]; then
              echo "FAIL: $FAILED test(s) failed"
              exit 1
            fi
            echo "All in-game tests passed"
          else
            echo "WARNING: No test results found in log"
            exit 1
          fi
