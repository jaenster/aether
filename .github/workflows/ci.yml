name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # Fetch pre-built DLLs from the artifacts branch
      - name: Fetch artifact DLLs
        run: |
          git fetch origin claude/artifacts-g7LoE --depth=1
          git checkout origin/claude/artifacts-g7LoE -- Aether.dll dbghelp.dll mozjs.dll

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build daemon
        run: pnpm --filter @aether/daemon build

      - name: Run daemon tests
        run: pnpm --filter @aether/daemon test
        timeout-minutes: 5

      # ── Set up minimal D2 game directory ──────────────────────────────
      - name: Prepare minimal game directory
        shell: pwsh
        run: |
          $gameDir = "packages/native/minimal"
          # Copy artifact DLLs into the game directory
          Copy-Item Aether.dll, dbghelp.dll, mozjs.dll -Destination $gameDir
          # D2 1.14d uses KnownFolder SavedGames via SHGetKnownFolderPath
          $savedGames = [Environment]::GetFolderPath('UserProfile') + '\Saved Games\Diablo II'
          New-Item -ItemType Directory -Force -Path $savedGames | Out-Null
          Copy-Item "$gameDir/save/*.d2s" -Destination $savedGames
          Write-Host "Saves copied to: $savedGames"
          Get-ChildItem $savedGames

      # ── Start daemon in test mode ─────────────────────────────────────
      - name: Start daemon (test mode)
        shell: bash
        run: |
          cd packages/daemon
          node dist/index.js --tests &
          sleep 2
          echo "Daemon started in test mode"

      # ── Launch game and run in-game tests ─────────────────────────────
      - name: Run in-game tests
        shell: cmd
        timeout-minutes: 3
        env:
          AETHER_DAEMON: 127.0.0.1:13119
          AETHER_ENTRY: main.ts
        run: |
          cd packages\native\minimal
          start /b Game.exe -w -nosound --headless
          :: Wait for game to boot, connect to daemon, run tests
          timeout /t 30 /nobreak >nul
          type aether_log.txt

      - name: Check test results
        shell: bash
        run: |
          LOG="packages/native/minimal/aether_log.txt"
          echo "=== Game Test Output ==="
          cat "$LOG" 2>/dev/null || { echo "No log file found"; exit 1; }
          echo ""
          # Check for test results line
          if grep -q "Results:.*failed" "$LOG"; then
            FAILED=$(grep "Results:" "$LOG" | grep -oP '\d+ failed' | grep -oP '^\d+')
            if [ "$FAILED" != "0" ]; then
              echo "FAIL: $FAILED test(s) failed"
              exit 1
            fi
            echo "All in-game tests passed"
          else
            echo "WARNING: No test results found in log"
            exit 1
          fi

      # ── Save everything as downloadable artifact ──────────────────────
      - name: Package
        if: always()
        shell: bash
        run: |
          mkdir -p staging
          cp Aether.dll dbghelp.dll mozjs.dll staging/
          cp -r scripts staging/
          cp packages/native/minimal/aether_log.txt staging/ 2>/dev/null || true
          cp -r packages/daemon/dist/test staging/test-results 2>/dev/null || true
          cp README.md staging/ 2>/dev/null || true
          cp INSTALL.txt staging/ 2>/dev/null || true

      - name: Save artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aether-windows
          path: staging/
          retention-days: 14
